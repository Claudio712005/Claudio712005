name: Generate Snake

on:
  schedule:
    - cron: "0 3 * * *"  
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: claudio712005
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=e94560&color_dots=#1a1a2e,#0f3460,#16213e,#e94560,#ffffff
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=e94560

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}